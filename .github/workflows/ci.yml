name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore ECommerceApi.sln

      - name: Build
        run: dotnet build ECommerceApi.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test ECommerceApi.sln --configuration Release --no-build --verbosity normal
